services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-optiflow}
      POSTGRES_USER: ${POSTGRES_USER:-optiflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-optiflow}
    command: >
      postgres
      -c max_connections=150
      -c idle_in_transaction_session_timeout=60000
      -c statement_timeout=180000
      -c log_min_duration_statement=500
    ports: ["127.0.0.1:5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-optiflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    pids_limit: 200
    mem_limit: 1g
    memswap_limit: 1g
    cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
  redis:
    image: redis:7
    restart: unless-stopped
    # maxmemory + allkeys-lru : eviction automatique des anciennes cles si Redis sature.
    # Evite OOM-kill quand rate-limiter/blacklist/cache cumulent trop de cles.
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: ["127.0.0.1:6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    pids_limit: 200
    mem_limit: 384m
    memswap_limit: 384m
    cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports: ["127.0.0.1:9000:9000", "127.0.0.1:9001:9001"]
    volumes: [minio_data:/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    pids_limit: 200
    mem_limit: 512m
    memswap_limit: 512m
    cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports: ["127.0.0.1:1025:1025", "127.0.0.1:8025:8025"]
    pids_limit: 100
    mem_limit: 128m
    memswap_limit: 128m
    cpus: '0.3'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: [.env]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports: ["127.0.0.1:8000:8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    pids_limit: 200
    mem_limit: 1536m
    memswap_limit: 1536m
    cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    restart: unless-stopped
    env_file: [.env]
    environment:
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    ports: ["127.0.0.1:3000:3000"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    pids_limit: 200
    mem_limit: 512m
    memswap_limit: 512m
    cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
    networks:
      - default
      - vps-net
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks worker --loglevel=info --concurrency=2
    env_file: [.env]
    environment:
      # Force le statement_timeout long (120s) pour les jobs de sync/long-running.
      # Sans cette variable, le worker herite du timeout API (30s) et les sync
      # Cosium en N+1 ou batch tombent en timeout silencieux.
      CELERY_WORKER: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks inspect ping -d celery@$$(hostname)\
            \ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    pids_limit: 200
    mem_limit: 512m
    memswap_limit: 512m
    cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    # Schedule persisté sur volume nommé : évite que Beat re-déclenche toutes
    # les tasks planifiées au restart container (bug précédent avec /tmp).
    command: celery -A app.tasks beat --loglevel=info --schedule=/app/celery-schedule/schedule.db
    env_file: [.env]
    volumes:
      - celerybeat_schedule:/app/celery-schedule
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/celery-schedule/schedule.db && find /app/celery-schedule/schedule.db\
            \ -mmin -5 | grep -q . || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    pids_limit: 100
    mem_limit: 256m
    memswap_limit: 256m
    cpus: '0.3'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
volumes:
  postgres_data:
  minio_data:
  celerybeat_schedule:
networks:
  vps-net:
    external: true
