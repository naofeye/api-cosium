name: CI

on:
  push:
    branches: [main, master]
    # V12.7.1 : skip docs/REVIEW auto-commits pour economiser les minutes Actions
    paths-ignore:
      - '**/*.md'
      - 'REVIEW.md'
      - '.claude-memory/**'
  pull_request:

jobs:
  backend-tests:
    name: Backend Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        # Decommenter pour matrice :
        # python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: optiflow_test
          POSTGRES_USER: optiflow
          POSTGRES_PASSWORD: optiflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://optiflow:optiflow@localhost:5432/optiflow_test
      JWT_SECRET: ci-test-secret-key-not-for-prod
      ENCRYPTION_KEY: WM973v2ZmRwE1PSjiBQcFpc3lhF0Q2zrJOSdPjALgQw=
      APP_ENV: test
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: optiflow-docs
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r apps/api/requirements.txt
      - run: cd apps/api && alembic upgrade head
      # Rollback test : valide que la derniere migration est reversible
      # (pas de DROP TABLE non-recreable). On cible la 1ere parent revision
      # via `alembic show head` au lieu de `downgrade -1`, ambigu quand
      # head est un mergepoint a 2 parents.
      - name: Test Alembic rollback
        run: |
          cd apps/api
          TARGET=$(alembic show head | grep -E '^(Parent|Merges):' | head -1 | awk '{print $2}' | tr -d ',')
          if [ -z "$TARGET" ]; then
            echo "Impossible de determiner la revision cible" >&2
            exit 1
          fi
          echo "Downgrading head -> $TARGET"
          alembic downgrade "$TARGET"
          alembic upgrade head
      - name: Run pytest with coverage
        run: |
          cd apps/api
          python -m pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term \
            --cov-fail-under=75
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: apps/api/coverage.xml
          flags: backend
          fail_ci_if_error: false  # ne fail pas le build si Codecov down
          token: ${{ secrets.CODECOV_TOKEN }}

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.11.8  # pin pour parite local container
      - run: cd apps/api && python -m ruff check app/

  backend-mypy-pilot:
    name: Backend Mypy Strict Pilot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy==1.13.0 pydantic sqlalchemy
      - name: Mypy strict on pilot modules
        run: |
          cd apps/api
          # Pilot scope (voir mypy.ini sections strict) :
          # - app.services._action_items.impact_score
          # - app.services.webhook_service
          # - app.services.api_token_service
          # - app.core.csrf
          # Etendre progressivement en ajoutant un nouveau bloc dans mypy.ini
          # puis le fichier ici. Doc : docs/CONTRIBUTING.md section Mypy.
          python -m mypy --config-file=mypy.ini \
            app/services/_action_items/impact_score.py \
            app/services/webhook_service.py \
            app/services/api_token_service.py \
            app/core/csrf.py \
            app/services/devis_signature_service.py \
            app/services/orphan_invoice_service.py \
            app/services/_factures/_email.py

  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit pip-audit
      # Bandit : static analysis code security. ll = medium/high, skip assert & shell in subprocess (false positives sur tests).
      - run: cd apps/api && bandit -r app/ -ll --skip B101,B601
      # pip-audit : CVEs strict. Pas d'ignore list — toute CVE detectee bloque
      # la CI. Codex M8 (REVIEW.md 2026-05-03) : pytest 8.4.2 -> 9.0.3 (CVE-2025-71176)
      # et fastapi 0.116.1 -> 0.122.0 + starlette 0.49.2 (CVE-2025-62727) bumps.
      - run: cd apps/api && pip-audit -r requirements.txt --strict

  frontend-typecheck:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci --legacy-peer-deps && npx tsc --noEmit

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci --legacy-peer-deps && npm run lint

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci --legacy-peer-deps && npm run test -- --run

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci --legacy-peer-deps
      - run: cd apps/web && npm audit --audit-level=moderate --omit=dev
      - run: cd apps/web && npm run build

  security-check:
    name: Security Regression Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite://
      JWT_SECRET: ci-test-secret-key-not-for-prod
      ENCRYPTION_KEY: WM973v2ZmRwE1PSjiBQcFpc3lhF0Q2zrJOSdPjALgQw=
      APP_ENV: test
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: optiflow-docs
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r apps/api/requirements.txt
      - run: cd apps/api && python -m pytest tests/test_security_regression.py -v

  gitignore-check:
    name: Gitignore Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check no build artifacts or sensitive files are tracked
        run: |
          errors=0

          # Check for .pyc files
          if git ls-files --cached '*.pyc' | grep -q .; then
            echo "::error::Found tracked .pyc files:"
            git ls-files --cached '*.pyc'
            errors=$((errors + 1))
          fi

          # Check for __pycache__ directories
          if git ls-files --cached '*__pycache__*' | grep -q .; then
            echo "::error::Found tracked __pycache__ files:"
            git ls-files --cached '*__pycache__*'
            errors=$((errors + 1))
          fi

          # Check for .env (but not .env.example)
          if git ls-files --cached '.env' | grep -q .; then
            echo "::error::Found tracked .env file (use .env.example instead)"
            errors=$((errors + 1))
          fi

          # Check for node_modules
          if git ls-files --cached '*node_modules*' | grep -q .; then
            echo "::error::Found tracked node_modules files:"
            git ls-files --cached '*node_modules*' | head -10
            errors=$((errors + 1))
          fi

          # Check for tsconfig.tsbuildinfo
          if git ls-files --cached 'apps/web/tsconfig.tsbuildinfo' | grep -q .; then
            echo "::error::Found tracked apps/web/tsconfig.tsbuildinfo"
            errors=$((errors + 1))
          fi

          # Check for celerybeat-schedule
          if git ls-files --cached '*celerybeat-schedule*' | grep -q .; then
            echo "::error::Found tracked celerybeat-schedule files:"
            git ls-files --cached '*celerybeat-schedule*'
            errors=$((errors + 1))
          fi

          # Check for .pid files
          if git ls-files --cached '*.pid' | grep -q .; then
            echo "::error::Found tracked .pid files:"
            git ls-files --cached '*.pid'
            errors=$((errors + 1))
          fi

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "::error::$errors category(ies) of files should not be tracked. Add them to .gitignore and run: git rm --cached <file>"
            exit 1
          fi

          echo "All clear — no build artifacts or sensitive files tracked."
