name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: optiflow_test
          POSTGRES_USER: optiflow
          POSTGRES_PASSWORD: optiflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://optiflow:optiflow@localhost:5432/optiflow_test
      JWT_SECRET: ci-test-secret-key-not-for-prod
      ENCRYPTION_KEY: ci-test-key-not-for-prod
      APP_ENV: test
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: optiflow-docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - run: cd backend && alembic upgrade head
      - run: cd backend && python -m pytest tests/ -v --tb=short

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: cd backend && python -m ruff check app/

  frontend-typecheck:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npx tsc --noEmit

  security-check:
    name: Security Regression Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite://
      JWT_SECRET: ci-test-secret-key-not-for-prod
      ENCRYPTION_KEY: ci-test-key-not-for-prod
      APP_ENV: test
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: optiflow-docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - run: cd backend && python -m pytest tests/test_security_regression.py -v
