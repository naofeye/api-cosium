name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-tests:
    name: Backend Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        # Decommenter pour matrice :
        # python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: optiflow_test
          POSTGRES_USER: optiflow
          POSTGRES_PASSWORD: optiflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://optiflow:optiflow@localhost:5432/optiflow_test
      JWT_SECRET: ci-test-secret-key-not-for-prod
      ENCRYPTION_KEY: WM973v2ZmRwE1PSjiBQcFpc3lhF0Q2zrJOSdPjALgQw=
      APP_ENV: test
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: optiflow-docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r apps/api/requirements.txt
      - run: cd apps/api && alembic upgrade head
      # Rollback test : downgrade -1 puis upgrade head pour valider que la
      # derniere migration est reversible (pas de DROP TABLE non-recreable).
      - name: Test Alembic rollback
        run: |
          cd apps/api
          alembic downgrade -1
          alembic upgrade head
      - name: Run pytest with coverage
        run: |
          cd apps/api
          python -m pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term \
            --cov-fail-under=45
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: apps/api/coverage.xml
          flags: backend
          fail_ci_if_error: false  # ne fail pas le build si Codecov down
          token: ${{ secrets.CODECOV_TOKEN }}

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.11.8  # pin pour parite local container
      - run: cd apps/api && python -m ruff check app/

  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit pip-audit
      # Bandit : static analysis code security. ll = medium/high, skip assert & shell in subprocess (false positives sur tests).
      - run: cd apps/api && bandit -r app/ -ll --skip B101,B601
      # pip-audit : CVEs strict. Ignore list documentee (triage 2026-04-16) :
      #   - CVE-2025-71176 (pytest) : dev-only, pas d'exposition prod
      #   - CVE-2025-62727 (starlette) : embed FastAPI 0.116, upgrade necessite FastAPI compatible
      - run: |
          cd apps/api && pip-audit -r requirements.txt --strict \
            --ignore-vuln CVE-2025-71176 \
            --ignore-vuln CVE-2025-62727

  frontend-typecheck:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci && npx tsc --noEmit

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci && npm run lint

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci && npm run test -- --run

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci
      - run: cd apps/web && npm audit --audit-level=high
      - run: cd apps/web && npm run build

  security-check:
    name: Security Regression Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite://
      JWT_SECRET: ci-test-secret-key-not-for-prod
      ENCRYPTION_KEY: WM973v2ZmRwE1PSjiBQcFpc3lhF0Q2zrJOSdPjALgQw=
      APP_ENV: test
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: optiflow-docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r apps/api/requirements.txt
      - run: cd apps/api && python -m pytest tests/test_security_regression.py -v

  gitignore-check:
    name: Gitignore Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no build artifacts or sensitive files are tracked
        run: |
          errors=0

          # Check for .pyc files
          if git ls-files --cached '*.pyc' | grep -q .; then
            echo "::error::Found tracked .pyc files:"
            git ls-files --cached '*.pyc'
            errors=$((errors + 1))
          fi

          # Check for __pycache__ directories
          if git ls-files --cached '*__pycache__*' | grep -q .; then
            echo "::error::Found tracked __pycache__ files:"
            git ls-files --cached '*__pycache__*'
            errors=$((errors + 1))
          fi

          # Check for .env (but not .env.example)
          if git ls-files --cached '.env' | grep -q .; then
            echo "::error::Found tracked .env file (use .env.example instead)"
            errors=$((errors + 1))
          fi

          # Check for node_modules
          if git ls-files --cached '*node_modules*' | grep -q .; then
            echo "::error::Found tracked node_modules files:"
            git ls-files --cached '*node_modules*' | head -10
            errors=$((errors + 1))
          fi

          # Check for tsconfig.tsbuildinfo
          if git ls-files --cached 'apps/web/tsconfig.tsbuildinfo' | grep -q .; then
            echo "::error::Found tracked apps/web/tsconfig.tsbuildinfo"
            errors=$((errors + 1))
          fi

          # Check for celerybeat-schedule
          if git ls-files --cached '*celerybeat-schedule*' | grep -q .; then
            echo "::error::Found tracked celerybeat-schedule files:"
            git ls-files --cached '*celerybeat-schedule*'
            errors=$((errors + 1))
          fi

          # Check for .pid files
          if git ls-files --cached '*.pid' | grep -q .; then
            echo "::error::Found tracked .pid files:"
            git ls-files --cached '*.pid'
            errors=$((errors + 1))
          fi

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "::error::$errors category(ies) of files should not be tracked. Add them to .gitignore and run: git rm --cached <file>"
            exit 1
          fi

          echo "All clear — no build artifacts or sensitive files tracked."
