name: E2E Playwright

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'REVIEW.md'
      - '.claude-memory/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright E2E (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: optiflow_test
          POSTGRES_USER: optiflow
          POSTGRES_PASSWORD: optiflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://optiflow:optiflow@localhost:5432/optiflow_test
      JWT_SECRET: ci-test-secret-key-not-for-prod
      ENCRYPTION_KEY: WM973v2ZmRwE1PSjiBQcFpc3lhF0Q2zrJOSdPjALgQw=
      APP_ENV: test
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: optiflow-docs
      # Nginx unifie tout sur port 80 — meme origin pour cookies
      CORS_ORIGINS: http://localhost
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      # Playwright : tout passe par nginx port 80
      E2E_BASE_URL: http://localhost
      E2E_API_URL: http://localhost
    steps:
      - uses: actions/checkout@v4

      # --- Nginx reverse proxy (same-origin pour cookies) ---
      - name: Install & start nginx
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq nginx
          sudo cp config/nginx/nginx.e2e.conf /etc/nginx/nginx.conf
          sudo nginx -t
          sudo systemctl start nginx
          echo "Nginx started on :80"

      # --- Backend ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r apps/api/requirements.txt
      - name: Apply migrations
        run: cd apps/api && alembic upgrade head
      - name: Seed default user/tenant
        run: cd apps/api && python -c "from app.db.session import SessionLocal; from app.seed import seed_data; db=SessionLocal(); seed_data(db); db.close()"
      - name: Start API (uvicorn)
        run: |
          cd apps/api
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "API up after ${i}s"
              break
            fi
            sleep 1
          done

      # --- Frontend ---
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci
      - run: cd apps/web && npm run build
      - name: Start Next (standalone)
        run: |
          cd apps/web
          # With outputFileTracingRoot set to monorepo root, standalone output
          # produces server.js at .next/standalone/apps/web/server.js
          STANDALONE_DIR=".next/standalone/apps/web"
          if [ ! -f "$STANDALONE_DIR/server.js" ]; then
            # Fallback: try root standalone
            STANDALONE_DIR=".next/standalone"
          fi
          echo "Using standalone dir: $STANDALONE_DIR"
          # Copy static assets + public into standalone (required by Next.js docs)
          mkdir -p "$STANDALONE_DIR/.next"
          cp -r .next/static "$STANDALONE_DIR/.next/static"
          cp -r public "$STANDALONE_DIR/public" 2>/dev/null || true
          PORT=3000 HOSTNAME=0.0.0.0 nohup node "$STANDALONE_DIR/server.js" > /tmp/web.log 2>&1 &
          echo $! > /tmp/web.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/login >/dev/null 2>&1; then
              echo "Web up after ${i}s"
              break
            fi
            sleep 1
          done

      # Verify nginx proxy works end-to-end
      - name: Verify nginx proxy
        run: |
          curl -fsS http://localhost/health && echo " -> API via nginx OK"
          curl -fsS http://localhost/login >/dev/null && echo " -> Web via nginx OK"

      # --- Playwright ---
      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: cd apps/web && npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            /tmp/api.log
            /tmp/web.log
            /var/log/nginx/error.log
          retention-days: 7
