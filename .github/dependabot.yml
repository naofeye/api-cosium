version: 2
updates:
  # Backend Python
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: [minor, patch]
    labels: [dependencies, python]

  # Frontend npm
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    labels: [dependencies, frontend]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, ci]

  # Docker
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: monthly
    labels: [dependencies, docker]
  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: monthly
    labels: [dependencies, docker]
