# Stack monitoring (optionnelle) — Prometheus + Grafana
# Usage: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    ports: ["127.0.0.1:9090:9090"]

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports: ["127.0.0.1:3001:3000"]
    depends_on: [prometheus]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-optiflow}:${POSTGRES_PASSWORD:-optiflow}@postgres:5432/${POSTGRES_DB:-optiflow}?sslmode=disable"
    depends_on: [postgres]

  redis-exporter:
    image: oliver006/redis_exporter:latest
    restart: unless-stopped
    command: ["--redis.addr=redis://redis:6379"]
    depends_on: [redis]

volumes:
  prometheus_data:
  grafana_data:
