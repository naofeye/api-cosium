global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: optiflow

scrape_configs:
  # Prometheus auto-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # OptiFlow API : endpoint /api/v1/admin/metrics-prom (a creer)
  - job_name: optiflow_api
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api

  # PostgreSQL via postgres-exporter
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres

  # Redis via redis-exporter
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis

# Alerting rules a definir dans config/prometheus/alerts.yml
# rule_files:
#   - alerts.yml
