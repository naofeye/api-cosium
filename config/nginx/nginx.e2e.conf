# Nginx E2E — reverse proxy minimal pour tests Playwright.
# Unifie API (:8000) et Web (:3000) sur le meme origin (:80).
# Pas de rate limiting, pas de HTTPS, pas de cache — juste le proxy.

events {
    worker_connections 64;
}

http {
    upstream api {
        server 127.0.0.1:8000;
    }

    upstream web {
        server 127.0.0.1:3000;
    }

    # === WebSocket upgrade mapping (H2C smuggling mitigation) ===
    map $http_upgrade $connection_upgrade {
        websocket upgrade;
        default   '';
    }

    server {
        listen 80;
        server_name _;

        # API proxy — tout /api/* va vers le backend
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP 127.0.0.1;
            proxy_set_header X-Forwarded-For 127.0.0.1;
            proxy_set_header X-Forwarded-Proto http;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            client_max_body_size 25M;
        }

        # Health check direct
        location /health {
            proxy_pass http://api;
        }

        # Frontend — tout le reste va vers Next.js
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For 127.0.0.1;
            proxy_set_header X-Forwarded-Proto http;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
