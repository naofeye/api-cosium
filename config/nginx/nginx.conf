events {
    # 4096 connections par worker. Augmenter a 8192+ si le serveur depasse 50 tenants ou 500 req/s.
    worker_connections 4096;
}

http {
    upstream api {
        # Backend FastAPI (uvicorn) — 1 instance suffit jusqu'a ~30 tenants actifs.
        # Pour scaler : ajouter `server api2:8000;` puis configurer load balancing.
        server api:8000;
    }

    upstream web {
        # Frontend Next.js — sert SSR + assets statiques.
        server web:3000;
    }

    # === Rate limiting ===
    # zone=login : anti-bruteforce sur /api/v1/auth/login (5 req/min/IP)
    # zone=api   : protection bots/scrapers globale (60 req/sec/IP, burst 120)
    # 10m de memoire = ~160k IPs trackees simultanement, suffisant pour usage opticien.
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    limit_req_status 429;

    # === Gzip compression ===
    # Compresse les reponses > 1KB pour reduire la bande passante.
    # Pas de compression sur images (deja compressees) ou fichiers tres petits.
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # === Request ID tracing ===
    # Genere un X-Request-ID unique par requete si absent (utile pour debug logs distribues).
    # Format log custom inclut le request_id pour correlation Sentry/Grafana.
    map $http_x_request_id $request_id_safe {
        default $http_x_request_id;
        ""      $request_id;
    }
    log_format main_with_id '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'rid=$request_id_safe rt=$request_time';
    access_log /var/log/nginx/access.log main_with_id;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # CSP: unsafe-inline pour Next.js hydration (inline styles/scripts requis).
        # unsafe-eval retire : le build prod Next.js n'en a pas besoin.
        # Pour durcir davantage : migrer vers nonces CSP (script-src 'self' 'nonce-{random}').
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'" always;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check — `default_type` evite le piege add_header / inheritance :
        # tout add_header dans une location bloque l'heritage des headers serveur.
        location /health {
            default_type text/plain;
            return 200 'OK';
        }

        # Metrics — localhost only (scrape Prometheus interne)
        location /api/v1/metrics {
            allow 127.0.0.1;
            deny all;
            return 403;
        }

        # API proxy
        location /api/ {
            limit_req zone=api burst=120 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # X-Request-ID propage pour correlation logs API <-> nginx
            proxy_set_header X-Request-ID $request_id_safe;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            # Aligne avec MAX_UPLOAD_SIZE_MB=20 cote FastAPI (+marge multipart)
            client_max_body_size 25M;
        }

        # Rate limited login
        location /api/v1/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Swagger docs + ReDoc bloques en prod (l'API desactive deja en prod, defense en profondeur)
        location /docs { return 404; }
        location /redoc { return 404; }
        location /openapi.json { return 404; }

        # Cache headers pour les assets statiques Next.js (cache 1 an, immutable)
        # IMPORTANT : nginx ne fait pas d'heritage des `add_header` quand une
        # location ajoute ses propres headers — on doit donc redeclarer les
        # security headers ici, sinon ils sautent sur _next/static.
        location /_next/static/ {
            proxy_pass http://web;
            proxy_set_header Host $host;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'" always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Frontend
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HTTPS server — activer apres obtention du certificat SSL
    # 1. Obtenir le certificat : docker compose run certbot certonly --webroot -w /var/www/certbot -d your-domain.com
    # 2. Remplacer "your-domain.com" par le vrai domaine
    # 3. Decommenter ce bloc
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/live/your-domain.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #
    #     # Security headers
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #     add_header X-Frame-Options "DENY" always;
    #     add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    #
    #     # Certbot renewal
    #     location /.well-known/acme-challenge/ {
    #         root /var/www/certbot;
    #     }
    #
    #     # API proxy
    #     location /api/ {
    #         proxy_pass http://api;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #         proxy_connect_timeout 10s;
    #         proxy_read_timeout 30s;
    #         client_max_body_size 50M;
    #     }
    #
    #     # Rate limited login
    #     location /api/v1/auth/login {
    #         limit_req zone=login burst=3 nodelay;
    #         proxy_pass http://api;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     }
    #
    #     # Block docs in production (Swagger + ReDoc)
    #     location /docs { return 404; }
    #     location /redoc { return 404; }
    #     location /openapi.json { return 404; }
    #
