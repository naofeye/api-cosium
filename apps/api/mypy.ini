# Configuration mypy pour OptiFlow.
#
# Strategy : strict mode active progressivement, fichier par fichier ou
# module par module. Le top-level reste tolerant pour ne pas bloquer le
# legacy. Les modules listes ci-dessous sont vraiment strict.
#
# Pour etendre : ajouter une section [mypy-app.services.X.*] avec le
# meme set d'options. Job CI dedie : .github/workflows/ci.yml etape
# `Backend Mypy strict pilot`.

[mypy]
python_version = 3.12
follow_imports = silent
explicit_package_bases = True
namespace_packages = True
ignore_missing_imports = True

# --- Modules pilots strict ---
# Algorithme deterministe pur : impact_score (score action items)
[mypy-app.services._action_items.impact_score]
strict = True
disallow_any_generics = True
disallow_untyped_defs = True
warn_return_any = True
no_implicit_optional = True

# Helpers webhooks (signature HMAC, generation token, build envelope)
[mypy-app.services.webhook_service]
strict = True
disallow_untyped_defs = True
warn_return_any = True

# Auth tokens API publique (hash, verify, scope check)
[mypy-app.services.api_token_service]
strict = True
disallow_untyped_defs = True
warn_return_any = True

# CSRF middleware (logique pure)
[mypy-app.core.csrf]
strict = True
disallow_untyped_defs = True
warn_return_any = True

# Devis signature electronique (eIDAS Simple)
[mypy-app.services.devis_signature_service]
strict = True
disallow_untyped_defs = True
warn_return_any = True

# PEC orphan invoice reconciliation
[mypy-app.services.orphan_invoice_service]
strict = True
disallow_untyped_defs = True
warn_return_any = True

# Email facture (PDF en piece jointe)
[mypy-app.services._factures._email]
strict = True
disallow_untyped_defs = True
warn_return_any = True
