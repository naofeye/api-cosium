# Override production : limites ressources + nginx + segmentation reseau (defense en profondeur).
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Reseaux :
#   - public   : expose vers l'exterieur via nginx. Trafic web/api.
#   - internal : sans acces internet (`internal: true`). Postgres/Redis/MinIO
#                joignables uniquement par api/worker/beat. Si web est compromis,
#                ces datastores restent inaccessibles directement.

networks:
  public:
    name: optiflow_public
    driver: bridge
  internal:
    name: optiflow_internal
    driver: bridge
    internal: true  # bloque tout trafic vers l'exterieur (egress)

# Log rotation par defaut pour tous les services (driver json-file Docker).
# 50MB par fichier, 5 fichiers max = 250MB plafond par container.
# Evite le remplissage du disque sur un incident verbose.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    compress: "true"

services:
  postgres:
    ports: !reset []
    networks: [internal]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M

  redis:
    ports: !reset []
    networks: [internal]
    logging: *default-logging
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M

  minio:
    ports: !reset []
    networks: [internal]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  mailhog:
    # Mailhog ne doit PAS tourner en prod (utiliser un vrai SMTP via env vars)
    profiles: ["dev-only"]

  api:
    ports: !reset []
    # api a besoin des 2 reseaux : internal pour DB/redis/minio, public pour
    # Cosium/Claude/Stripe (appels sortants via internet) et reception trafic via nginx.
    networks: [internal, public]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M

  web:
    ports: !reset []
    networks: [public]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  worker:
    # worker execute les tasks de sync Cosium + envoi email SMTP -> besoin internet
    networks: [internal, public]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M

  beat:
    networks: [internal]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    networks: [public]
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./runtime/nginx/logs:/var/log/nginx
      - ./runtime/certbot/conf:/etc/nginx/ssl:ro
      - ./runtime/certbot/www:/var/www/certbot:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
